<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#dc2626" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="C. Cádiz" />
  <title>Cercanías Cádiz</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --red: #dc2626;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273249;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #22c55e;
      --radius: 14px;
      --font: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

    /* ===== LAYOUT ===== */
    #app { display: grid; height: 100%; grid-template-rows: 56px 1fr 52px; }

    /* ===== TOPBAR ===== */
    #topbar {
      background: var(--red);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 1000;
    }
    #topbar .logo {
      width: 30px; height: 30px; background: white; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; font-weight: 700; flex: 1; }
    #topbar .badge {
      background: rgba(255,255,255,0.2); border-radius: 999px;
      padding: 3px 9px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    #lastUpdate { font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap; }
    #refreshBtn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 17px;
    }
    #refreshBtn.loading { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== CONTENT ===== */
    #content { position: relative; overflow: hidden; }

    /* ===== HORARIOS VIEW ===== */
    #horariosView {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
    }
    #horariosView.active { display: flex; }

    /* Form de búsqueda */
    #searchForm {
      background: var(--surface);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .form-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .form-row select, .form-row input[type="date"] {
      flex: 1;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 10px;
      font-size: 13px; outline: none; min-width: 0;
    }
    .form-row select:focus, .form-row input:focus { border-color: var(--accent); }
    /* flecha entre origin/dest */
    .arrow-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }
    #searchBtn {
      width: 100%;
      background: var(--red); color: white; border: none;
      border-radius: 10px; padding: 9px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: var(--font);
    }
    #searchBtn:hover { background: #b91c1c; }

    /* Lista de trenes */
    #trainList {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #trainList::-webkit-scrollbar { width: 4px; }
    #trainList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .train-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .train-card .line-badge {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: white;
      flex-shrink: 0; letter-spacing: -0.5px; text-align: center;
      line-height: 1.1;
    }
    .train-card .info { flex: 1; min-width: 0; }
    .train-card .info .label {
      font-weight: 700; font-size: 15px;
      display: flex; align-items: center; gap: 8px;
    }
    .train-card .info .label .dep { color: var(--text); }
    .train-card .info .label .arrow { color: var(--muted); font-size: 13px; }
    .train-card .info .label .arr { color: var(--accent); }
    .train-card .info .sub { font-size: 11px; color: var(--muted); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .train-card .duration {
      font-size: 12px; font-weight: 600; color: var(--green);
      text-align: right; flex-shrink: 0; white-space: nowrap;
    }

    /* ===== EMPTY / ERROR ===== */
    #emptyState {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; color: var(--muted); gap: 8px; padding: 24px;
    }
    #emptyState .icon { font-size: 40px; }
    #emptyState p { font-size: 13px; text-align: center; }
    #errorMsg {
      display: none; position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      background: #7f1d1d; color: #fca5a5;
      padding: 8px 16px; border-radius: 10px; font-size: 12px;
      z-index: 2000; max-width: calc(100% - 32px); text-align: center;
    }
    #errorMsg.show { display: block; }

    /* ===== MAP VIEW ===== */
    #mapView {
      position: absolute; inset: 0;
      display: none;
    }
    #mapView.active { display: block; }
    #map { width: 100%; height: 100%; }

    /* Leaflet dark override */
    .leaflet-container { background: #1a2332 !important; }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important; color: var(--text) !important;
      border-radius: 12px !important; box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; }

    /* ===== BOTTOM NAV ===== */
    #bottomNav {
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 1000;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 6px 0; font-size: 10px;
      font-weight: 600; font-family: var(--font);
    }
    .nav-btn .icon { font-size: 20px; }
    .nav-btn.active { color: var(--red); }

    /* ===== OFFLINE / LOADING ===== */
    #offlineBanner {
      display: none; position: fixed;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #b45309; color: white;
      padding: 8px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #offlineBanner.show { display: block; }

    /* Loading spinner overlay */
    #loadingOverlay {
      display: none; position: absolute; inset: 0;
      background: rgba(15,23,42,0.8);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; z-index: 500;
    }
    #loadingOverlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loadingOverlay p { font-size: 13px; color: var(--muted); }

    /* ===== INSTALL PROMPT ===== */
    #installPrompt {
      display: none; position: fixed;
      bottom: 64px; left: 12px; right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      z-index: 5000; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      align-items: center; gap: 12px;
    }
    #installPrompt.show { display: flex; }
    #installPrompt .text { flex: 1; font-size: 13px; line-height: 1.4; }
    #installPrompt .text strong { display: block; margin-bottom: 2px; }
    #installPrompt .text span { color: var(--muted); }
    #installBtn {
      background: var(--red); color: white; border: none;
      border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #dismissInstall { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; }
  </style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <header id="topbar">
    <div class="logo">🚆</div>
    <h1>Cercanías Cádiz</h1>
    <span id="trainCount" class="badge">Cargando...</span>
    <span id="lastUpdate"></span>
    <button id="refreshBtn" title="Recargar datos">↻</button>
  </header>

  <!-- CONTENT -->
  <main id="content">

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="show">
      <div class="spinner"></div>
      <p>Descargando horarios GTFS de Renfe…</p>
    </div>

    <!-- HORARIOS VIEW -->
    <div id="horariosView" class="active">
      <div id="searchForm">
        <div class="form-row">
          <label>Origen</label>
          <select id="originSelect"><option>Cargando…</option></select>
          <span class="arrow-icon">→</span>
          <label>Destino</label>
          <select id="destSelect"><option>Cargando…</option></select>
        </div>
        <div class="form-row">
          <label>Fecha</label>
          <input type="date" id="dateInput" />
        </div>
        <button id="searchBtn">🔍 Buscar trenes</button>
      </div>

      <div id="trainList"></div>
      <div id="emptyState">
        <div class="icon">🚉</div>
        <p>No hay trenes para esta ruta y fecha.<br>Prueba con otra combinación.</p>
      </div>
      <div id="errorMsg"></div>
    </div>

    <!-- MAP VIEW -->
    <div id="mapView">
      <div id="map"></div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottomNav">
    <button class="nav-btn active" id="navHorarios" onclick="switchView('horarios')">
      <span class="icon">🗓️</span>
      <span>Horarios</span>
    </button>
    <button class="nav-btn" id="navMap" onclick="switchView('map')">
      <span class="icon">🗺️</span>
      <span>Mapa C1</span>
    </button>
  </nav>
</div>

<div id="offlineBanner">⚠️ Sin conexión</div>

<div id="installPrompt">
  <div class="text">
    <strong>Instalar app</strong>
    <span>Añade Cercanías Cádiz a tu pantalla de inicio</span>
  </div>
  <button id="installBtn">Instalar</button>
  <button id="dismissInstall">✕</button>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js"></script>
<script>
  // Conectar loading overlay con el estado de carga
  const _origSetLoading = setLoading;
  function setLoading(on) {
    document.getElementById('loadingOverlay').classList.toggle('show', on);
    _origSetLoading(on);
  }
</script>
</body>
</html>

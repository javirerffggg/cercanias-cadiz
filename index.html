<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#dc2626" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="C. Cádiz" />
  <title>Cercanías Cádiz</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    :root {
      --red: #dc2626;
      --red-dark: #b91c1c;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273249;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --radius: 14px;
      --font: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    #app {
      display: grid;
      height: 100%;
      grid-template-rows: 56px 1fr 52px;
      grid-template-columns: 1fr;
    }

    /* ===== TOPBAR ===== */
    #topbar {
      grid-row: 1;
      background: var(--red);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 1000;
    }
    #topbar .logo {
      width: 32px; height: 32px;
      background: white;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 13px;
      color: var(--red);
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 16px; font-weight: 700; flex: 1; }
    #topbar .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    #lastUpdate {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }
    #refreshBtn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.15s;
    }
    #refreshBtn:hover { background: rgba(255,255,255,0.28); }
    #refreshBtn.loading { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== CONTENT ===== */
    #content {
      grid-row: 2;
      position: relative;
      overflow: hidden;
    }

    /* ===== MAP VIEW ===== */
    #mapView {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
    }
    #filterBar {
      background: var(--surface);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      z-index: 100;
    }
    #filterBar select, #filterBar input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }
    #filterBar select:focus, #filterBar input:focus {
      border-color: var(--accent);
    }
    #filterBar input { flex: 1; min-width: 120px; }
    #map { flex: 1; }

    /* Leaflet dark override */
    .leaflet-container { background: #1a2332 !important; }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; }
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background-color: rgba(220,38,38,0.3) !important;
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background-color: rgba(220,38,38,0.75) !important;
      color: white !important;
      font-weight: 700 !important;
    }

    /* ===== LIST VIEW ===== */
    #listView {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #listView.active { display: flex; }
    #mapView.active { display: flex; }
    #mapView { display: flex; }

    #listSearch {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; gap: 8px; align-items: center;
    }
    #listSearch input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 13px;
      outline: none;
    }
    #listSearch input:focus { border-color: var(--accent); }
    #listSearch select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }

    #trainList {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #trainList::-webkit-scrollbar { width: 4px; }
    #trainList::-webkit-scrollbar-track { background: transparent; }
    #trainList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .train-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .train-card:hover { background: var(--surface2); border-color: var(--accent); }
    .train-card .line-badge {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    .train-card .line-badge.c1 { background: #16a34a; }
    .train-card .line-badge.c2 { background: #d97706; }
    .train-card .line-badge.c3 { background: #7c3aed; }
    .train-card .line-badge.c4 { background: #0284c7; }
    .train-card .line-badge.c5 { background: #db2777; }
    .train-card .line-badge.c6 { background: #059669; }
    .train-card .info { flex: 1; min-width: 0; }
    .train-card .info .label {
      font-weight: 600; font-size: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .train-card .info .sub {
      font-size: 12px; color: var(--muted); margin-top: 2px;
    }
    .train-card .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .train-card .status-dot.moving { background: #22c55e; }
    .train-card .status-dot.stopped { background: #f59e0b; }
    .train-card .coords {
      font-size: 11px; color: var(--muted);
      text-align: right; flex-shrink: 0;
    }

    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--muted);
      gap: 8px;
    }
    #emptyState .icon { font-size: 40px; }
    #emptyState p { font-size: 14px; text-align: center; padding: 0 24px; }

    /* ===== BOTTOM NAV ===== */
    #bottomNav {
      grid-row: 3;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 1000;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 0;
      font-size: 10px;
      font-weight: 600;
      transition: color 0.15s;
      font-family: var(--font);
    }
    .nav-btn .icon { font-size: 20px; }
    .nav-btn.active { color: var(--red); }
    .nav-btn:hover { color: var(--text); }

    /* ===== OFFLINE BANNER ===== */
    #offlineBanner {
      display: none;
      position: fixed;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #b45309;
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #offlineBanner.show { display: block; }

    /* ===== ERROR STATE ===== */
    #errorMsg {
      display: none;
      position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 2000;
      max-width: calc(100% - 32px);
      text-align: center;
    }
    #errorMsg.show { display: block; }

    /* ===== INSTALL PROMPT ===== */
    #installPrompt {
      display: none;
      position: fixed;
      bottom: 64px; left: 12px; right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      z-index: 5000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      gap: 12px;
    }
    #installPrompt.show { display: flex; }
    #installPrompt .text { flex: 1; font-size: 13px; line-height: 1.4; }
    #installPrompt .text strong { color: var(--text); display: block; margin-bottom: 2px; }
    #installPrompt .text span { color: var(--muted); }
    #installBtn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #dismissInstall {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <header id="topbar">
    <div class="logo">🚆</div>
    <h1>Cercanías Cádiz</h1>
    <span id="trainCount" class="badge">—</span>
    <span id="lastUpdate">—</span>
    <button id="refreshBtn" title="Actualizar">↻</button>
  </header>

  <!-- CONTENT -->
  <main id="content">
    <!-- MAP VIEW -->
    <div id="mapView" class="active">
      <div id="filterBar">
        <select id="lineFilter">
          <option value="">Todas las líneas</option>
        </select>
        <input id="mapSearch" type="search" placeholder="Buscar tren / trip…" />
      </div>
      <div id="map"></div>
      <div id="errorMsg"></div>
    </div>

    <!-- LIST VIEW -->
    <div id="listView">
      <div id="listSearch">
        <input id="listSearchInput" type="search" placeholder="Buscar tren, línea…" />
        <select id="listLineFilter">
          <option value="">Todas</option>
        </select>
      </div>
      <div id="trainList"></div>
      <div id="emptyState">
        <div class="icon">🚉</div>
        <p>No hay trenes que coincidan con el filtro</p>
      </div>
    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottomNav">
    <button class="nav-btn active" id="navMap" onclick="switchView('map')">
      <span class="icon">🗺️</span>
      <span>Mapa</span>
    </button>
    <button class="nav-btn" id="navList" onclick="switchView('list')">
      <span class="icon">📋</span>
      <span>Lista</span>
    </button>
  </nav>
</div>

<div id="offlineBanner">⚠️ Sin conexión — datos en caché</div>

<div id="installPrompt">
  <div class="text">
    <strong>Instalar app</strong>
    <span>Añade Cercanías Cádiz a tu pantalla de inicio</span>
  </div>
  <button id="installBtn">Instalar</button>
  <button id="dismissInstall">✕</button>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js"></script>
</body>
</html>
